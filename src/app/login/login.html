<main class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title><h1 class="login-title">Acesso ao Sistema</h1></mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form #loginForm="ngForm" (ngSubmit)="submit(loginForm)" aria-label="Formulário de login">
        <mat-form-field appearance="outline">
          <mat-label>Usuário</mat-label>
          <input matInput name="user" [(ngModel)]="user" placeholder="Digite seu usuário" required #userInput="ngModel" autocomplete="username">
          @if (userInput.invalid && (userInput.dirty || userInput.touched)) {
            <mat-error>Usuário é obrigatório</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput [type]="showPassword() ? 'text' : 'password'" name="password" [(ngModel)]="password" placeholder="Digite sua senha" required #passwordInput="ngModel" autocomplete="current-password">
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-pressed]="showPassword()"
            [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) {
            <mat-error>Senha é obrigatória</mat-error>
          }
        </mat-form-field>

        @if (error()) {
          <div class="login-error" role="alert" aria-live="assertive">{{error()}}</div>
        }

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading()">
            {{ loading() ? 'AGUARDE...' : 'ACESSAR' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</main>
