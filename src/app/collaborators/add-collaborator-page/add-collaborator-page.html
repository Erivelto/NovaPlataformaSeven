<section class="collaborators-container" aria-labelledby="add-collab-title">
  <mat-card>
    <header class="header">
      <div class="title">
        <h2 id="add-collab-title">{{ isEditMode ? 'Editar Colaborador' : 'Cadastro de Novo Colaborador' }}</h2>
        <p>{{ isEditMode ? 'Altere os dados do colaborador' : 'Preencha os dados abaixo para cadastrar um novo colaborador no sistema' }}</p>
      </div>
      <button mat-raised-button (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
        Voltar
      </button>
    </header>
    <hr>

    <app-add-collaborator 
      [collaboratorId]="collaboratorId"
      [isEditMode]="isEditMode"
      (collaboratorAdded)="onCollaboratorAdded()"
      (collaboratorUpdated)="onCollaboratorAdded()">
    </app-add-collaborator>
  </mat-card>
</section>
